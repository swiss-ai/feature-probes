image = "${SCRATCH}/ce-images/feature-probes+25.06-main.sqsh"  

mounts = [
        "/capstor",
        "/iopsstor",
        "/users/${USER}/keys/", # keys for WANDB, HUGGINGFACE etc
    ]

workdir = "/iopsstor/scratch/cscs/${USER}/feature-probes"

[annotations]
com.hooks.aws_ofi_nccl.enabled = "true"
com.hooks.aws_ofi_nccl.variant = "cuda12"



[env]
NCCL_DEBUG                      = "INFO"
CUDA_CACHE_DISABLE              = "1"
TORCH_NCCL_ASYNC_ERROR_HANDLING = "1"
MPICH_GPU_SUPPORT_ENABLED       = "0"

HF_HOME      = "/capstor/scratch/cscs/${USER}/feature-probes/hf_cache"
HF_HUB_CACHE = "/capstor/scratch/cscs/${USER}/feature-probes/hf_cache"
UV_CACHE_DIR = "/capstor/scratch/cscs/${USER}/feature-probes/uv_cache"
WANDB_DIR    = "/capstor/scratch/cscs/${USER}/feature-probes/wandb"

LOCAL_PROBES_DIR = "/capstor/scratch/cscs/${USER}/feature-probes/probes"