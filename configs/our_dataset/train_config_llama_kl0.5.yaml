# Example training configuration for hallucination detection probe

probe_config:
  probe_id: "llama_lora_kl=0.5_our"

  model_name: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  layer: 30  # Second to last layer for Llama 3.1 8B

  lora_layers: "all"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

  load_from: null
  hf_repo_id: "tymciurymciu/hallucination-probes"

  threshold: 0.5


wandb_project: "hallucination-probes"

upload_to_hf: true
save_evaluation_metrics: true
save_roc_curves: false
dump_raw_eval_results: false

# Training hyperparameters
per_device_train_batch_size: 8 
per_device_eval_batch_size: 8
high_loss_threshold: null
lambda_lm: 0.0
lambda_kl: 0.5
anneal_max_aggr: true
anneal_warmup: 1.0
probe_head_lr: 1e-3
lora_lr: 1e-4
enable_gradient_checkpointing: true
gradient_accumulation_steps: 1
max_grad_norm: 1.0
logging_steps: 10
seed: 42

# Training datasets
train_datasets:
  - dataset_id: "longfact_train"
    hf_repo: "tymciurymciu/longfact-test-split"
    subset: "Meta_Llama_3.1_8B_Instruct"
    split: "train"
    max_length: 1536
    default_ignore: false
    last_span_token: false
    ignore_buffer: 0
    pos_weight: 10.0
    neg_weight: 10.0
    shuffle: true
    seed: 42
    process_on_the_fly: false

# Evaluation datasets
eval_datasets:
  - dataset_id: "longfact_test_llama"
    hf_repo: "tymciurymciu/longfact-test-split"
    subset: "Meta_Llama_3.1_8B_Instruct"
    split: "test"
    max_length: 1536
    pos_weight: 10.0
    neg_weight: 10.0
    default_ignore: false
    shuffle: false

  - dataset_id: "longfact_test_apertus"
    hf_repo: "tymciurymciu/longfact-test-split"
    subset: "Apertus_8B_Instruct_2509"
    split: "test"
    max_length: 1536
    pos_weight: 10.0
    neg_weight: 10.0
    default_ignore: false
    shuffle: false